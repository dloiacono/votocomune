version: '3.8'

services:
  # ────────────────────────────────────────────────
  # PostgreSQL Database
  # ────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: comunali-db
    environment:
      POSTGRES_DB: comunali
      POSTGRES_USER: comunali
      POSTGRES_PASSWORD: comunali
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comunali"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────
  # Quarkus Backend
  # ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: comunali-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/comunali
      DB_USER: comunali
      DB_PASSWORD: comunali
      QUARKUS_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ────────────────────────────────────────────────
  # React Frontend (solo per preview build prod)
  # In sviluppo usa: npm run dev (porta 5173)
  # ────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: comunali-frontend
    depends_on:
      - backend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    profiles:
      - prod  # Attiva solo con: docker-compose --profile prod up

volumes:
  postgres_data:

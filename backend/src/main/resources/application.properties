# Application
quarkus.application.name=comunali-backend
quarkus.application.version=1.0.0

# Database Configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:comunali}
quarkus.datasource.password=${DB_PASSWORD:comunali}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/comunali}

# Hibernate Configuration
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://comunali.app
smallrye.jwt.sign.key.location=privateKey.pem

# CORS Configuration
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.access-control-max-age=24H

# HTTP Configuration
quarkus.http.port=8080
quarkus.http.test-port=8081

# OpenAPI/Swagger UI
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=Comunali API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API per il conteggio voti elezioni comunali italiane

# Development mode
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.log.level=INFO

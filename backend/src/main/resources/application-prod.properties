# Production Profile

# Database (remote/containerized PostgreSQL)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_URL}
quarkus.datasource.jdbc.max-size=8

# Hibernate
# PRIMO DEPLOY: drop-and-create crea lo schema e carica import.sql
# Dopo il primo deploy riuscito, cambiare in: update
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging
quarkus.log.level=INFO
quarkus.log.category."it.comunali".level=INFO
quarkus.log.console.format=%d{HH:mm:ss} %-5p (%c{2.}) %s%e%n

# JWT Keys — passate come env var (non come file .pem)
# In locale usa application.properties (file .pem), in prod usa queste env var
mp.jwt.verify.publickey=${JWT_PUBLIC_KEY}
smallrye.jwt.sign.key=${JWT_PRIVATE_KEY}

# CORS (specifico per production)
# Imposta CORS_ORIGINS con l'URL Vercel dopo il primo deploy frontend
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:*}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.access-control-max-age=3600

# HTTP
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# OpenAPI/Swagger
quarkus.swagger-ui.always-include=false
quarkus.swagger-ui.path=/q/swagger-ui

# Security Headers
quarkus.http.header."X-Content-Type-Options"=nosniff
quarkus.http.header."X-Frame-Options"=DENY
quarkus.http.header."X-XSS-Protection"=1; mode=block
quarkus.http.header."Strict-Transport-Security"=max-age=31536000; includeSubDomains

# Performance
quarkus.native.enable-all-charsets=false

# Development Profile

# Database (local PostgreSQL)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:comunali}
quarkus.datasource.password=${DB_PASSWORD:comunali}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/comunali}

# Hibernate
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging
quarkus.log.level=DEBUG
quarkus.log.category."it.comunali".level=DEBUG

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.access-control-max-age=24H

# HTTP
quarkus.http.port=8080

# OpenAPI/Swagger
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.smallrye-openapi.path=/q/openapi

# Dev Mode
quarkus.live-reload.instrumentation=true
quarkus.dev-services.enabled=false

# Test Configuration - H2 in-memory database
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL

# Hibernate - drop and recreate for each test run
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# JWT - use test keys
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://comunali.app
smallrye.jwt.sign.key.location=privateKey.pem

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*

# Swagger disabled in tests
quarkus.swagger-ui.always-include=false

# Import test data
quarkus.hibernate-orm.sql-load-script=import.sql
